<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Risk Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f4;--surface3:#e8eaef;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1a1d26;--muted:#7a8094;--accent:#3d6fff;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;height:100vh;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;position:relative}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.12em;display:flex;align-items:center;gap:10px;color:var(--text)}
.pulse{width:7px;height:7px;border-radius:50%;background:#3d6fff;animation:pulseAnim 2.5s ease-in-out infinite}
@keyframes pulseAnim{0%,100%{box-shadow:0 0 0 0 rgba(61,111,255,.5)}50%{box-shadow:0 0 0 5px rgba(61,111,255,0)}}
.main-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:7px;border:1px solid var(--border)}
.main-tab{background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:5px 14px;border-radius:5px;cursor:pointer;transition:all .15s}
.main-tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.body{display:flex;height:calc(100vh - 52px);overflow:hidden}
.sidebar{width:252px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:14px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.s-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.search-box{position:relative}
.search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px 8px 28px;outline:none;transition:border .15s}
.search-box input:focus{border-color:var(--border2)}
.search-box input::placeholder{color:var(--muted)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--muted)}
.fbtns{display:flex;flex-direction:column;gap:3px}
.fb{display:flex;align-items:center;justify-content:space-between;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;cursor:pointer;transition:all .12s;text-align:left}
.fb:hover{background:var(--surface2);border-color:var(--border2)}
.fb.active{border-color:rgba(61,111,255,.4);background:rgba(61,111,255,.07)}
.fb .bx{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.rn{color:#5a6e48;background:#e8eddf}.rl{color:#1a6fa8;background:#d6eaf8}.rm{color:#1a48cc;background:#d4e0ff}.rh{color:#0d2a8a;background:#c2ceff}.rc{color:#fff;background:#0d1a4a}
.tp3{color:#1a7a30;background:#d4f0da}.tp2{color:#1f6b2e;background:#c8ecd0}.tp1{color:#1a5a28;background:#bce6c4}.t0{color:#606878;background:#e8eaef}.tm1{color:#b83030;background:#fde0d0}.tm2{color:#a01a1a;background:#fcd0c8}.tm3{color:#fff;background:#c01010}
.legend-box{display:flex;flex-direction:column;gap:3px}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.legend-swatch{width:14px;height:8px;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
.divider{height:1px;background:var(--border);margin:2px 0}
.clear-btn{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:6px;cursor:pointer;width:100%;transition:all .12s}
.clear-btn:hover{color:var(--text);border-color:var(--border2)}
.stats-bar{display:flex;gap:5px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.stat-c{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface2)}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-lbl{font-size:11px;color:var(--muted)}
.stat-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}

/* map layout */
#view-map{display:flex;flex-direction:column;flex:1;overflow:hidden}
#map-row{display:flex;flex:1;overflow:hidden;min-height:0}
#world-panel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#leaflet-world{flex:1;min-height:0}
.leaflet-container{background:#eef0f3!important}
.zoom-ctrls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:500}
.zoom-btn{width:28px;height:28px;background:var(--surface);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.zoom-btn:hover{background:var(--surface2)}

/* city panel */
#city-panel{width:0;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:width .35s ease}
#city-panel.open{width:420px}
.cp-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.cp-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text)}
.cp-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.cp-close{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);width:26px;height:26px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cp-close:hover{color:var(--text)}
#leaflet-city{height:240px;flex-shrink:0}
.cp-body{flex:1;overflow-y:auto;padding:12px 14px}
.cp-overall{display:flex;gap:7px;margin-bottom:12px}
.cp-ov{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;flex:1}
.cp-ov-lbl{font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.cp-ov-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.cp-tabs{display:flex;gap:3px;margin-bottom:10px;background:var(--surface2);padding:3px;border-radius:7px;border:1px solid var(--border);width:fit-content}
.cp-tab{background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.cp-tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.cp-panel{display:none}.cp-panel.active{display:block}
.dblock{margin-bottom:5px;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.drow{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;transition:background .12s}
.drow:hover{background:var(--surface2)}
.dicon{width:24px;height:24px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.dname{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;flex:1;color:var(--text)}
.chev{font-size:11px;color:var(--muted);transition:transform .2s}
.drow.exp .chev{transform:rotate(90deg)}
.dinds{display:none;padding:0 12px 8px;border-top:1px solid var(--border);background:var(--surface2)}
.dinds.open{display:block}
.irow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
.irow:last-child{border-bottom:none}
.iname{font-size:11px;color:var(--muted);flex:1}
.isum{font-size:10px;color:var(--muted);font-style:italic;text-align:right;max-width:160px;line-height:1.4}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap}

/* tooltip */
#map-tip{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;pointer-events:none;z-index:9999;min-width:175px;opacity:0;transition:opacity .15s;box-shadow:0 4px 20px rgba(0,0,0,.14)}
.tip-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:5px;color:var(--text)}
.tip-meta{font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:.04em}
.tip-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:3px 0;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.tip-row:last-of-type{border-bottom:none}
.tip-pill{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.tip-more{margin-top:6px;font-size:10px;color:var(--accent)}

/* cities tab */
#view-cities{display:none;flex:1;overflow-y:auto;padding:14px 16px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--border2);background:var(--surface2)}
.ccard-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.ccard-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.domains-g{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin:8px 0}
.dm{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;background:var(--surface2);border-radius:3px;font-size:10px;color:var(--muted)}
.ddot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lrow{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:grid;grid-template-columns:140px 130px 70px repeat(6,1fr) 86px;gap:5px;align-items:center;cursor:pointer;transition:all .15s;font-size:11px}
.lrow:hover{border-color:var(--border2);background:var(--surface2)}
.lhdr{padding:4px 12px;display:grid;grid-template-columns:140px 130px 70px repeat(6,1fr) 86px;gap:5px;font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.ctabs{display:flex;gap:3px;margin-bottom:12px;background:var(--surface2);padding:3px;border-radius:7px;border:1px solid var(--border);width:fit-content}
.ctab{background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.ctab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}
.no-results{padding:60px;text-align:center;color:var(--muted)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="pulse"></div>GLOBAL RISK MONITOR</div>
  <div class="main-tabs">
    <button class="main-tab active" id="tab-map" onclick="switchMain('map')">🌍 World Map</button>
    <button class="main-tab" id="tab-cities" onclick="switchMain('cities')">🏙 Cities</button>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div>
      <span class="s-label">Search</span>
      <div class="search-box">
        <svg class="si" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
        <input type="text" id="search-input" placeholder="Country or city...">
      </div>
    </div>
    <div>
      <span class="s-label">Map Colour Mode</span>
      <div class="fbtns" id="mode-btns">
        <button class="fb active" data-m="rating" onclick="setMode('rating',this)">By Rating</button>
        <button class="fb" data-m="trend" onclick="setMode('trend',this)">By Trend</button>
      </div>
    </div>
    <div>
      <span class="s-label">Filter Rating</span>
      <div class="fbtns">
        <button class="fb" onclick="toggleR('Critical',this)"><span>Critical</span><span class="bx rc">CR</span></button>
        <button class="fb" onclick="toggleR('High',this)"><span>High</span><span class="bx rh">HI</span></button>
        <button class="fb" onclick="toggleR('Medium',this)"><span>Medium</span><span class="bx rm">ME</span></button>
        <button class="fb" onclick="toggleR('Low',this)"><span>Low</span><span class="bx rl">LO</span></button>
        <button class="fb" onclick="toggleR('Negligible',this)"><span>Negligible</span><span class="bx rn">NL</span></button>
      </div>
    </div>
    <div>
      <span class="s-label">Filter Trend</span>
      <div class="fbtns">
        <button class="fb" onclick="toggleT('3',this)"><span>+3 Sig. Improving</span><span class="bx tp3">+++</span></button>
        <button class="fb" onclick="toggleT('2',this)"><span>+2 Improving</span><span class="bx tp2">++</span></button>
        <button class="fb" onclick="toggleT('1',this)"><span>+1 Stabilizing</span><span class="bx tp1">+</span></button>
        <button class="fb" onclick="toggleT('0',this)"><span>0 No Change</span><span class="bx t0">–</span></button>
        <button class="fb" onclick="toggleT('-1',this)"><span>-1 Deteriorating</span><span class="bx tm1">-</span></button>
        <button class="fb" onclick="toggleT('-2',this)"><span>-2 Disruptive</span><span class="bx tm2">--</span></button>
        <button class="fb" onclick="toggleT('-3',this)"><span>-3 Sig. Deteriorating</span><span class="bx tm3">---</span></button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <span class="s-label">Legend</span>
      <div class="legend-box" id="legend"></div>
    </div>
    <button class="clear-btn" onclick="clearAll()">✕ Clear filters</button>
  </div>

  <div class="content">
    <div id="view-map">
      <div class="stats-bar" id="stats-bar"></div>
      <div id="map-row">
        <div id="world-panel" style="position:relative">
          <div id="leaflet-world"></div>
          <div class="zoom-ctrls">
            <button class="zoom-btn" onclick="wmap&&wmap.zoomIn()">+</button>
            <button class="zoom-btn" onclick="wmap&&wmap.zoomOut()">−</button>
            <button class="zoom-btn" style="font-size:11px" onclick="resetZoom()">⟳</button>
          </div>
        </div>
        <div id="city-panel">
          <div class="cp-head">
            <div><div class="cp-title" id="cp-title"></div><div class="cp-sub" id="cp-sub"></div></div>
            <button class="cp-close" onclick="closeCityPanel()">✕</button>
          </div>
          <div id="leaflet-city"></div>
          <div class="cp-body">
            <div class="cp-overall" id="cp-overall"></div>
            <div class="cp-tabs">
              <button class="cp-tab active" onclick="switchCPTab('ratings',this)">Ratings</button>
              <button class="cp-tab" onclick="switchCPTab('trends',this)">Trends</button>
            </div>
            <div class="cp-panel active" id="cp-ratings"></div>
            <div class="cp-panel" id="cp-trends"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="view-cities">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="ctabs">
          <button class="ctab active" onclick="setCityV('grid',this)">Grid</button>
          <button class="ctab" onclick="setCityV('list',this)">List</button>
        </div>
        <span style="font-size:11px;color:var(--muted)" id="city-count"></span>
      </div>
      <div id="city-content"></div>
    </div>
  </div>
</div>

<div id="map-tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function genLoc(name,type,oR,oT){
  const ord={Negligible:0,Low:1,Medium:2,High:3,Critical:4};
  const domains={};
  DOMAINS.forEach(d=>{
    const inds={};d.inds.forEach(i=>{inds[i]={rating:rnd(RATINGS),summary:rnd(SUMS)}});
    const base=ord[oR];
    const domR=RATINGS[Math.max(0,Math.min(4,base+rnd([-1,-1,0,0,0,1,1])))];
    const domT=Math.max(-3,Math.min(3,oT+rnd([-1,0,0,1])));
    domains[d.key]={rating:domR,trend:domT,indicators:inds};
  });
  return{name,type,domains,overall:oR,trend:oT};
}
const CD={};
CLIST.forEach(([n,iso,r,t])=>{CD[iso]=genLoc(n,'country',r,t);});

function makeCity(city,country,iso,r,t,lat,lon){
  const loc=genLoc(city,'city',r,t);
  loc.country=country;loc.iso=iso;loc.lat=lat;loc.lon=lon;
  return loc;
}

function getISOFromFeature(f){
  const p=f.properties||{};
  const name=(p.name||p.NAME||p.admin||p.ADMIN||'').toLowerCase().trim();
  return GEO_ALIASES[name]||NAME_ISO[name]||null;
}

function countryFill(iso){
  const loc=iso?CD[iso]:null;
  if(!loc) return '#e8eaed';
  return mapMode==='rating'?RATING_FILL[loc.overall]:TREND_FILL[String(loc.trend)];
}

function getStyle(feature){
  const iso=getISOFromFeature(feature);
  const fi=getFilteredISOs();
  const loc=iso?CD[iso]:null;
  if(!loc) return{fillColor:'#e8eaed',fillOpacity:1,color:'#b8c4ce',weight:0.6,opacity:1};
  const inF=!fi||fi.has(iso);
  return{fillColor:inF?countryFill(iso):'#f0f0f0',fillOpacity:1,color:'#b0bcc8',weight:0.6,opacity:1};
}

function onEach(feature,layer){
  const iso=getISOFromFeature(feature);
  const loc=iso?CD[iso]:null;
  if(!loc) return;
  layer.on({
    mouseover(e){
      e.target.setStyle({color:'#3d6fff',weight:2,fillOpacity:0.85});
      const tip=document.getElementById('map-tip');
      tip.innerHTML=`<div class="tip-name">${loc.name}</div>${DOMAINS.slice(0,3).map(d=>`<div class="tip-row"><span>${d.name}</span><span class="tip-pill ${RCS[loc.domains[d.key].rating]}">${loc.domains[d.key].rating}</span></div>`).join('')}<div class="tip-more">Click to view details →</div>`;
      tip.style.opacity='1';
    },
    mousemove(e){
      const tip=document.getElementById('map-tip');
      tip.style.left=(e.originalEvent.clientX+14)+'px';
      tip.style.top=(e.originalEvent.clientY-8)+'px';
    },
    mouseout(e){
      if(countryLayer)countryLayer.resetStyle(e.target);
      document.getElementById('map-tip').style.opacity='0';
    },
    click(){
      document.getElementById('map-tip').style.opacity='0';
      openDetailPanel(loc,false);
      try{wmap.fitBounds(layer.getBounds(),{padding:[40,40],maxZoom:6});}catch(e){}
    }
  });
}

function initMap(){
  wmap=L.map('leaflet-world',{zoomControl:false,minZoom:2,maxZoom:10}).setView([20,10],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org">OpenStreetMap</a>, &copy; CARTO',
    subdomains:'abcd',maxZoom:19
  }).addTo(wmap);

  fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
    .then(r=>r.json())
    .then(data=>{
      countryLayer=L.geoJSON(data,{style:getStyle,onEachFeature:onEach}).addTo(wmap);
      renderCityDots();
      renderStats();
    })
    .catch(err=>console.warn('GeoJSON load failed:',err));
}

function renderCityDots(){
  if(!wmap) return;
  if(cityLayer){cityLayer.clearLayers();}else{cityLayer=L.layerGroup().addTo(wmap);}
  const fi=getFilteredISOs();
  CITY_DATA.forEach(loc=>{
    const inF=!fi||fi.has(loc.iso);
    const fill=mapMode==='rating'?RATING_FILL[loc.overall]:TREND_FILL[String(loc.trend)];
    const m=L.circleMarker([loc.lat,loc.lon],{
      radius:4,fillColor:inF?fill:'#ccc',fillOpacity:inF?1:0.3,color:'#fff',weight:1.5
    });
    m.on('mouseover',e=>{
      const tip=document.getElementById('map-tip');
      tip.innerHTML=`<div class="tip-name">${loc.name}</div><div class="tip-meta">Capital of ${loc.country}</div>${DOMAINS.slice(0,3).map(d=>`<div class="tip-row"><span>${d.name}</span><span class="tip-pill ${RCS[loc.domains[d.key].rating]}">${loc.domains[d.key].rating}</span></div>`).join('')}<div class="tip-more">Click to open city map →</div>`;
      tip.style.left=(e.originalEvent.clientX+14)+'px';
      tip.style.top=(e.originalEvent.clientY-8)+'px';
      tip.style.opacity='1';
    });
    m.on('mousemove',e=>{
      const tip=document.getElementById('map-tip');
      tip.style.left=(e.originalEvent.clientX+14)+'px';
      tip.style.top=(e.originalEvent.clientY-8)+'px';
    });
    m.on('mouseout',()=>document.getElementById('map-tip').style.opacity='0');
    m.on('click',()=>{document.getElementById('map-tip').style.opacity='0';openDetailPanel(loc,true);});
    cityLayer.addLayer(m);
  });
}

// ── RECOLOR ───────────────────────────────────────────────────────────
function recolor(){
  if(countryLayer) countryLayer.setStyle(f=>{
    const iso=getISOFromFeature(f);
    const fi=getFilteredISOs();
    const loc=iso?CD[iso]:null;
    if(!loc) return{fillColor:'#e8eaed',fillOpacity:1,color:'#b8c4ce',weight:0.6};
    const inF=!fi||fi.has(iso);
    return{fillColor:inF?countryFill(iso):'#f0f0f0',fillOpacity:1,color:'#b0bcc8',weight:0.6};
  });
  renderCityDots();
}

function getFilteredISOs(){
  if(!activeR.size&&!activeT.size&&!sq) return null;
  const s=new Set();
  CLIST.forEach(([n,iso])=>{
    const l=CD[iso];if(!l)return;
    if(sq&&!n.toLowerCase().includes(sq)&&!iso.toLowerCase().includes(sq))return;
    if(activeR.size&&!activeR.has(l.overall))return;
    if(activeT.size&&!activeT.has(String(l.trend)))return;
    s.add(iso);
  });
  return s;
}

function renderStats(){
  const fi=getFilteredISOs();
  const cnt={Negligible:0,Low:0,Medium:0,High:0,Critical:0};
  CLIST.forEach(([n,iso])=>{const l=CD[iso];if(!l)return;if(fi&&!fi.has(iso))return;cnt[l.overall]++;});

}

    return true;
  });
  document.getElementById('city-count').textContent=`${data.length} capitals`;
  const c=document.getElementById('city-content');
  if(!data.length){c.innerHTML='<div class="no-results">No cities match current filters</div>';return;}
  const idx=l=>CITY_DATA.indexOf(l);
  if(cityV==='grid'){
    c.innerHTML=`<div class="cgrid">${data.map(l=>`<div class="ccard" onclick="switchMain('map');setTimeout(()=>openDetailPanel(CITY_DATA[${idx(l)}],true),50)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div class="ccard-name">${l.name}</div><div class="ccard-sub">${l.country}</div></div><span class="pill ${RCS[l.overall]}">${l.overall.substring(0,2).toUpperCase()}</span></div><div class="domains-g">${DOMAINS.map(d=>`<div class="dm"><span>${d.name.substring(0,4)}</span><div class="ddot" style="background:${DOT[l.domains[d.key].rating]}"></div></div>`).join('')}</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:var(--muted)">Trend</span><span class="pill ${TCS[String(l.trend)]}">${TA[String(l.trend)]} ${l.trend>0?'+':''}${l.trend}</span></div></div>`).join('')}</div>`;
  } else {
    c.innerHTML=`<div class="lhdr"><span>Capital</span><span>Country</span><span>Overall</span>${DOMAINS.map(d=>`<span>${d.name.substring(0,4)}</span>`).join('')}<span>Trend</span></div><div style="display:flex;flex-direction:column;gap:3px">${data.map(l=>`<div class="lrow" onclick="switchMain('map');setTimeout(()=>openDetailPanel(CITY_DATA[${idx(l)}],true),50)"><div style="font-family:'Syne',sans-serif;font-weight:600;font-size:12px">${l.name}</div><div style="font-size:11px;color:var(--muted)">${l.country}</div><span class="pill ${RCS[l.overall]}">${l.overall.substring(0,2).toUpperCase()}</span>${DOMAINS.map(d=>`<span class="pill ${RCS[l.domains[d.key].rating]}">${l.domains[d.key].rating.substring(0,2).toUpperCase()}</span>`).join('')}<span class="pill ${TCS[String(l.trend)]}">${TA[String(l.trend)]} ${l.trend>0?'+':''}${l.trend}</span></div>`).join('')}</div>`;
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────
function toggleR(r,b){activeR.has(r)?(activeR.delete(r),b.classList.remove('active')):(activeR.add(r),b.classList.add('active'));update();}
function toggleT(t,b){activeT.has(t)?(activeT.delete(t),b.classList.remove('active')):(activeT.add(t),b.classList.add('active'));update();}
function setMode(m,b){mapMode=m;document.querySelectorAll('#mode-btns .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');recolor();renderLegend();}
function clearAll(){activeR.clear();activeT.clear();sq='';document.getElementById('search-input').value='';document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));document.querySelector('[data-m="rating"]').classList.add('active');mapMode='rating';update();renderLegend();}
document.getElementById('search-input').addEventListener('input',e=>{
  sq=e.target.value.toLowerCase();
  update();
  if(!sq) return;
  // auto-zoom to single matching city
  const cm=CITY_DATA.filter(l=>l.name.toLowerCase().includes(sq)||l.country.toLowerCase().includes(sq));
  if(cm.length===1){openDetailPanel(cm[0],true);return;}
  // auto-zoom to single matching country
  const ctm=CLIST.filter(([n])=>n.toLowerCase().includes(sq));
  if(ctm.length===1){openDetailPanel(CD[ctm[0][1]],false);}
});
function update(){recolor();renderStats();if(mainV==='cities')renderCities();}
function switchMain(v){
  mainV=v;
  document.getElementById('tab-map').classList.toggle('active',v==='map');
  document.getElementById('tab-cities').classList.toggle('active',v==='cities');
  document.getElementById('view-map').style.display=v==='map'?'flex':'none';
  document.getElementById('view-cities').style.display=v==='cities'?'flex':'none';
  if(v==='cities')renderCities();
  if(v==='map'&&cityMap)setTimeout(()=>cityMap.invalidateSize(),400);
  if(v==='map'&&wmap)setTimeout(()=>wmap.invalidateSize(),50);
}
function setCityV(v,b){cityV=v;document.querySelectorAll('.ctab').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderCities();}

// ── INIT ──────────────────────────────────────────────────────────────
renderLegend();
renderStats();
requestAnimationFrame(initMap);
</script>
</body>
</html>
